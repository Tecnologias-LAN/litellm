# =================================================================
# Configuración de ejemplo para LiteLLM con Enterprise en Dokploy
# =================================================================
# 
# Este archivo es un ejemplo de configuración mínima para desplegar
# LiteLLM Proxy con Enterprise habilitado en Dokploy.
#
# Para usar este archivo:
# 1. Copia este archivo en tu proyecto de Dokploy
# 2. Personaliza los modelos y configuraciones según tus necesidades
# 3. Monta este archivo en el contenedor en: /app/config.yaml
# =================================================================

# Lista de modelos disponibles
model_list:
  # Ejemplo: OpenAI
  - model_name: gpt-4
    litellm_params:
      model: gpt-4
      api_key: os.environ/OPENAI_API_KEY
  
  # Ejemplo: Azure OpenAI
  - model_name: azure-gpt-4
    litellm_params:
      model: azure/gpt-4
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: "2024-02-15-preview"
  
  # Ejemplo: Anthropic Claude
  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

# Configuración general
general_settings:
  # Master key para autenticación (usar LITELLM_MASTER_KEY en env)
  master_key: os.environ/LITELLM_MASTER_KEY
  
  # Licencia Enterprise (configurar en variables de entorno)
  # litellm_license: os.environ/LITELLM_LICENSE
  
  # Configuración de base de datos para persistencia
  # database_url: os.environ/DATABASE_URL
  
  # Alertas por Slack (opcional)
  # alerting: ["slack"]
  # alerting_threshold: 300  # segundos
  
  # Logging y caché
  proxy_batch_write_at: 60  # Batch de escrituras cada 60s
  
  # Límites de conexión a DB por proceso worker
  database_connection_pool_limit: 10
  
  # Habilitar/deshabilitar features
  # block_robots: true  # Bloquear crawlers web (Enterprise)
  
  # Configuración de callbacks para observabilidad (opcional)
  # success_callback: ["langfuse"]
  # failure_callback: ["langfuse"]

# Configuración de router (para load balancing y fallbacks)
router_settings:
  # Configuración de Redis para rate limiting compartido (opcional)
  # redis_host: os.environ/REDIS_HOST
  # redis_password: os.environ/REDIS_PASSWORD
  # redis_port: 6379
  
  # Estrategia de routing
  routing_strategy: simple-shuffle  # o "least-busy", "latency-based-routing"
  
  # Reintentos y timeouts
  num_retries: 3
  timeout: 300  # segundos
  
  # Rate limiting
  # rpm: 1000  # Requests por minuto
  # tpm: 100000  # Tokens por minuto

# Configuración de liteLLM
litellm_settings:
  # Nivel de logging
  # set_verbose: false  # true para debug
  
  # Callbacks adicionales (Enterprise features)
  # callbacks: ["secret_detection"]  # Detectar secretos en requests
  
  # Caché (opcional)
  # cache: true
  # cache_params:
  #   type: "redis"
  #   host: os.environ/REDIS_HOST
  #   port: 6379

# =================================================================
# FEATURES ENTERPRISE DISPONIBLES
# =================================================================
# 
# Una vez que configures LITELLM_LICENSE, tendrás acceso a:
# 
# ✅ SSO para Admin UI (Google, Microsoft, Generic OIDC)
# ✅ Audit Logs con políticas de retención
# ✅ JWT Authentication
# ✅ Control de rutas públicas/privadas
# ✅ Secret Managers (AWS, GCP, Azure, Hashicorp Vault)
# ✅ IP-based access control
# ✅ Tracking de IP addresses
# ✅ Rate limiting avanzado por prioridad
# ✅ Team-based logging (Langfuse por team)
# ✅ Presupuestos por tags y virtual keys
# ✅ Exportar logs a GCS/Azure Blob
# ✅ Key rotations
# ✅ Content moderation avanzado
# ✅ Custom branding
# 
# Documentación: https://docs.litellm.ai/docs/proxy/enterprise
# =================================================================
