# =================================================================
# Docker Compose para LiteLLM Enterprise - Testing Local
# =================================================================
# 
# Este archivo es para probar localmente antes de desplegar en Dokploy.
# 
# Uso:
# 1. Copia .env.example a .env y configura tus variables
# 2. docker-compose -f docker-compose.enterprise.yml up -d
# 3. Accede a http://localhost:4000
# 
# =================================================================

version: '3.8'

services:
  # Servicio PostgreSQL para persistencia
  postgres:
    image: postgres:15-alpine
    container_name: litellm-postgres
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - litellm-network

  # Servicio Redis para rate limiting (opcional)
  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme456}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - litellm-network

  # Servicio principal LiteLLM Proxy con Enterprise
  litellm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    environment:
      # ===== ENTERPRISE LICENSE =====
      LITELLM_LICENSE: ${LITELLM_LICENSE}
      
      # ===== AUTENTICACIÓN =====
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-1234567890abcdef}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-random-32-char-string-for-encryption}
      
      # ===== BASE DE DATOS =====
      DATABASE_URL: postgresql://litellm:${DB_PASSWORD:-changeme123}@postgres:5432/litellm
      USE_PRISMA_MIGRATE: "True"
      
      # ===== CONFIGURACIÓN GENERAL =====
      LITELLM_MODE: PRODUCTION
      STORE_MODEL_IN_DB: "True"
      
      # ===== ADMIN UI =====
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-admin123}
      
      # ===== REDIS (OPCIONAL) =====
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme456}
      
      # ===== PROVEEDORES LLM =====
      # Agrega tus API keys aquí o en el archivo .env
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AZURE_API_KEY: ${AZURE_API_KEY}
      AZURE_API_BASE: ${AZURE_API_BASE}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      
      # ===== OBSERVABILIDAD (OPCIONAL) =====
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      
      # ===== ALERTAS (OPCIONAL) =====
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      
      # ===== DEBUG (DESCOMENTAR SI NECESITAS) =====
      # LITELLM_LOG: DEBUG
    volumes:
      # Monta un config.yaml personalizado si lo tienes
      - ./config.dokploy.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - litellm-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  litellm-network:
    driver: bridge

# =================================================================
# COMANDOS ÚTILES
# =================================================================
# 
# Iniciar servicios:
#   docker-compose -f docker-compose.enterprise.yml up -d
# 
# Ver logs:
#   docker-compose -f docker-compose.enterprise.yml logs -f litellm
# 
# Detener servicios:
#   docker-compose -f docker-compose.enterprise.yml down
# 
# Detener y eliminar volúmenes (CUIDADO - borra datos):
#   docker-compose -f docker-compose.enterprise.yml down -v
# 
# Rebuild la imagen:
#   docker-compose -f docker-compose.enterprise.yml build --no-cache
# 
# Ejecutar comando dentro del contenedor:
#   docker-compose -f docker-compose.enterprise.yml exec litellm bash
# 
# Ver estado de servicios:
#   docker-compose -f docker-compose.enterprise.yml ps
# 
# =================================================================
